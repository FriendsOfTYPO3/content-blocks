name: example/card-group
fields:
  - identifier: header
    useExistingField: true
  - identifier: row_items
    alias: rowItems
    type: Radio
    default: 1
    items:
      - value: 1
      - value: 2
      - value: 3
      - value: 4
  - identifier: pi_flexform
    alias: settings
    useExistingField: true
    label: Settings
    fields:
      - identifier: alignment
        label: Alignment
        type: SelectText
        items:
          - value: 'left'
          - value: 'center'
          - value: 'right'
  - identifier: card_group_item
    alias: items
    type: Collection
    labelField: title
    minitems: 1
    fields:
      - identifier: image
        type: File
        allowed: common-image-types
        relationship: oneToOne
      - identifier: title
        type: Text
      - identifier: bodytext
        type: Textarea
        enableRichtext: true
      - identifier: palette_link
        type: Palette
        fields:
          - identifier: link
            type: Link
            allowedTypes:
              - page
              - url
              - file
          - identifier: link_title
            alias: linkTitle
            type: Text
            eval: 'trim'
