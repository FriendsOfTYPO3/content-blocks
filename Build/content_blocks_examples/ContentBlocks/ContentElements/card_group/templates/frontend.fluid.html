<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:asset.css identifier="cbCardGroupCssFrontend" href="{cb:assetPath()}/frontend.css"/>

<div class="cb-card-group">
    <f:if condition="{data.items}">
        <div class="card-group-element card-group-element-align-{data.settings.alignment} card-group-element-columns-{data.rowItems}">
            <f:for each="{data.items}" as="item" iteration="iteration">

                <div class="card-group-element-item">
                    <div class="card">
                        <f:if condition="{item.image}">
                            <div class="card-img-top">
                                <f:render partial="LinkWrap" arguments="{link: item.link, linkTitle: item.title}" contentAs="content">
                                    <f:image image="{item.image}"/>
                                </f:render>
                            </div>
                        </f:if>
                        <div class="card-body">
                            <h3 class="card-title">
                                <f:render partial="LinkWrap" arguments="{link: item.link, linkTitle: item.title}" contentAs="content">
                                    {item.title}
                                </f:render>
                            </h3>
                            <f:if condition="{item.bodytext}">
                                <f:format.raw>{item.bodytext}</f:format.raw>
                            </f:if>
                        </div>
                        <f:if condition="{item.link}">
                            <f:variable name="linkTitle">
                                <f:if condition="{item.linkTitle}">
                                    <f:then>{item.linkTitle}</f:then>
                                    <f:else><f:translate key="{cb:languagePath()}:readmore"/></f:else>
                                </f:if>
                            </f:variable>
                            <div class="card-footer">
                                <f:link.typolink parameter="{item.link}" class="btn" title="{linkTitle}">
                                    <span class="btn-text">
                                        {linkTitle}
                                    </span>
                                </f:link.typolink>
                            </div>
                        </f:if>
                    </div>
                </div>
            </f:for>
        </div>
    </f:if>
</div>

</html>
