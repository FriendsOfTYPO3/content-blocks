name: example/cta
fields:
  - identifier: tab_1
    type: Tab
  - identifier: header
    alias: title
    useExistingField: true
  - identifier: bodytext
    alias: text
    useExistingField: true
    enableRichtext: true
  - identifier: link
    type: Link
    autocomplete: true
    allowedTypes:
      - page
      - url
      - file
    required: true
  - identifier: link_title
    alias: linkTitle
    type: Text
    required: true
  - identifier: background_image
    alias: backgroundImage
    type: File
    relationship: oneToOne
    minitems: 1
    allowed: common-image-types
